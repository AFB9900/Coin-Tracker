<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Tracker Pro - Giriş</title>
    <!-- Kesin Çözüm: Her Tarayıcıda Çalışan Kararlı Tailwind v3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0b0e11] text-[#eaecef] font-sans min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-[#181a20] rounded-2xl border border-[#2b2f36] p-8 shadow-2xl">
        
        <!-- Logo & Başlık -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-[#f0b90b]/10 text-[#f0b90b] text-3xl mb-3 border border-[#f0b90b]/20">
                <i class="fa-solid fa-chart-line"></i>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-wide">Quant Terminal Pro</h1>
            <p class="text-[#848e9c] text-sm mt-1">Kurumsal Kripto ve Hacim Analiz Üssü</p>
        </div>

        <!-- Bildirim Mesajları (Hata veya Başarı) -->
        {% if error %}
        <div class="mb-4 p-3 bg-red-900/30 border border-red-500/40 rounded-xl text-red-200 text-sm flex items-center gap-2">
            <i class="fa-solid fa-circle-exclamation text-red-400"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        {% if success %}
        <div class="mb-4 p-3 bg-green-900/30 border border-green-500/40 rounded-xl text-green-200 text-sm flex items-center gap-2">
            <i class="fa-solid fa-circle-check text-green-400"></i>
            <span>{{ success }}</span>
        </div>
        {% endif %}

        <!-- Giriş Formu -->
        <form action="/login" method="POST" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-[#848e9c] mb-2">Kullanıcı Adı</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-[#5e6673]">
                        <i class="fa-solid fa-user"></i>
                    </span>
                    <input type="text" name="username" required placeholder="Kullanıcı adınızı girin"
                        class="w-full pl-10 pr-4 py-3 bg-[#2b2f36] border border-[#474d57] rounded-xl text-white placeholder-[#5e6673] focus:outline-none focus:border-[#f0b90b] focus:ring-1 focus:ring-[#f0b90b] transition-all">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-[#848e9c] mb-2">Şifre</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-[#5e6673]">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" name="password" required placeholder="••••••••"
                        class="w-full pl-10 pr-4 py-3 bg-[#2b2f36] border border-[#474d57] rounded-xl text-white placeholder-[#5e6673] focus:outline-none focus:border-[#f0b90b] focus:ring-1 focus:ring-[#f0b90b] transition-all">
                </div>
            </div>

            <button type="submit" 
                class="w-full py-3 bg-[#f0b90b] hover:bg-[#d9a507] text-[#0b0e11] font-bold rounded-xl shadow-lg shadow-[#f0b90b]/10 transition-all transform hover:-translate-y-0.5 cursor-pointer">
                Giriş Yap
            </button>
        </form>

        <!-- Kayıt Yönlendirmesi -->
        <div class="mt-6 text-center border-t border-[#2b2f36] pt-5">
            <p class="text-sm text-[#848e9c]">
                Hesabınız yok mu? 
                <a href="/register" class="text-[#f0b90b] hover:underline font-medium ml-1">Yeni Hesap Oluştur</a>
            </p>
        </div>

    </div>

</body>
</html>
