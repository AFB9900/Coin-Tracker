<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Tracker Pro - Kayıt Ol</title>
    <script src="https://cdn.tailwindcss.com"></script>    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0b0e11] text-[#eaecef] font-sans min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-[#181a20] rounded-2xl border border-[#2b2f36] p-8 shadow-2xl my-8">
        
        <!-- Başlık -->
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-white tracking-wide">Yeni Hesap Aç</h1>
            <p class="text-[#848e9c] text-sm mt-1">Kendi API ve Bildirim Botunu Entegre Et</p>
        </div>

        <!-- Hata Bildirimi -->
        {% if error %}
        <div class="mb-4 p-3 bg-red-900/30 border border-red-500/40 rounded-xl text-red-200 text-sm flex items-center gap-2">
            <i class="fa-solid fa-circle-exclamation text-red-400"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <!-- Kayıt Formu -->
        <form action="/register" method="POST" class="space-y-4">
            
            <!-- Temel Kimlik Bilgileri Bölümü -->
            <div class="border-b border-[#2b2f36] pb-4 space-y-4">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-[#848e9c] mb-1.5">Kullanıcı Adı</label>
                    <input type="text" name="username" required placeholder="Örn: ahmetfurkan"
                        class="w-full px-4 py-2.5 bg-[#2b2f36] border border-[#474d57] rounded-xl text-white placeholder-[#5e6673] focus:outline-none focus:border-[#f0b90b] focus:ring-1 focus:ring-[#f0b90b] transition-all">
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-[#848e9c] mb-1.5">Şifre</label>
                    <input type="password" name="password" required placeholder="Güçlü bir şifre belirleyin"
                        class="w-full px-4 py-2.5 bg-[#2b2f36] border border-[#474d57] rounded-xl text-white placeholder-[#5e6673] focus:outline-none focus:border-[#f0b90b] focus:ring-1 focus:ring-[#f0b90b] transition-all">
                </div>
            </div>

            <!-- Telegram Bot Entegrasyon Bölümü (Kişisel Güvenlik İçin) -->
            <div class="space-y-4 pt-2">
                <div class="bg-[#2b2f36]/30 p-3 rounded-xl border border-[#2b2f36] text-xs text-[#848e9c] flex gap-2 items-start">
                    <i class="fa-solid fa-shield-halved text-[#f0b90b] text-sm mt-0.5"></i>
                    <span>Limit alarmlarının doğrudan kendi cebinize gelmesi için kendi Telegram bot bilgilerinizi girin. Boş bırakabilirsiniz.</span>
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-[#848e9c] mb-1.5">Telegram Bot Token (İsteğe Bağlı)</label>
                    <input type="text" name="telegram_token" placeholder="123456789:ABCdefGhI..."
                        class="w-full px-4 py-2.5 bg-[#2b2f36] border border-[#474d57] rounded-xl text-white placeholder-[#5e6673] focus:outline-none focus:border-[#f0b90b] focus:ring-1 focus:ring-[#f0b90b] transition-all text-sm font-mono">
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-[#848e9c] mb-1.5">Telegram Chat ID (İsteğe Bağlı)</label>
                    <input type="text" name="telegram_chat_id" placeholder="Örn: 987654321"
                        class="w-full px-4 py-2.5 bg-[#2b2f36] border border-[#474d57] rounded-xl text-white placeholder-[#5e6673] focus:outline-none focus:border-[#f0b90b] focus:ring-1 focus:ring-[#f0b90b] transition-all text-sm font-mono">
                </div>
            </div>

            <button type="submit" 
                class="w-full py-3 mt-4 bg-[#f0b90b] hover:bg-[#d9a507] text-[#0b0e11] font-bold rounded-xl shadow-lg shadow-[#f0b90b]/10 transition-all transform hover:-translate-y-0.5 cursor-pointer">
                Hesap Oluştur
            </button>
        </form>

        <!-- Giriş Sayfasına Dönüş -->
        <div class="mt-5 text-center border-t border-[#2b2f36] pt-4">
            <p class="text-sm text-[#848e9c]">
                Zaten hesabınız var mı? 
                <a href="/login" class="text-[#f0b90b] hover:underline font-medium ml-1">Giriş Yapın</a>
            </p>
        </div>

    </div>

</body>
</html>
